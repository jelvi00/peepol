services:
  db:
    image: postgres:16-alpine
    container_name: peepol-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - ${DB_HOST_PORT:-5432}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PORT: ${BACKEND_PORT:-4556}
    container_name: peepol-api
    ports:
      - "${BACKEND_PORT:-4556}:${BACKEND_PORT:-4556}"
    environment:
      - SERVER_PORT=${BACKEND_PORT:-4556}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - PASETO_SECRET_KEY=${PASETO_SECRET_KEY}
      - SYSTEM_USERNAME=${SYSTEM_USERNAME}
      - SYSTEM_PASSWORD=${SYSTEM_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PORT: ${FRONTEND_PORT:-3000}
    container_name: peepol-web
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      - PORT=${FRONTEND_PORT:-3000}
      - NXT_BE_URL=${NXT_BE_URL}
    depends_on:
      - backend

networks:
  default:
    name: peepol-network
